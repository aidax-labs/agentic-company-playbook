name: API Spec Lint

on:
  pull_request:
    paths:
      - 'openapi/**'

jobs:
  spectral:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Lint OpenAPI spec
        run: spectral lint openapi/openapi.yaml --ruleset .spectral.yaml --fail-severity error
